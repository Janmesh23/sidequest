services:
  - type: web
    name: sidequest-backend
    env: docker
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/sidequest.db
      - key: CHROMA_SERVER_NOFILE
        value: "65535"
      - key: CHROMA_PERSIST_PATH
        value: /data/chroma_db
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
    disk:
      # Use 1 worker to prevent SQLite/ChromaDB "database is locked" errors on startup
      name: sidequest-data
      mountPath: /data
      sizeGB: 1
